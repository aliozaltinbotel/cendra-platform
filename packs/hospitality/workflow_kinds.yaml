# Hospitality pack — workflow-kind vocabulary + event aliases.
#
# Seeds the per-tenant brain_workflow_kinds registry (PORTING_MAP Batch 2:
# the reference's 12-member WorkflowKind enum became registry rows; pack
# loader lands in Batch 6).  Kinds are stable wire strings persisted in
# WorkflowAutonomy.workflow and shown in the Trust Meter — renaming one is
# a breaking change requiring a data migration.
#
# Extracted at Batch 2 port time from the reference's
# autonomy/workflow_kinds.py (WorkflowKind + _EVENT_TYPE_MAP).

workflow_kinds:
  mismatch_extra_fee:
    event_aliases: [guest_count_mismatch, extra_person_fee, extra_fee]
  code_release:
    event_aliases: [send_access_code, access_code_request]
  orphan_night:
    event_aliases: [min_stay_exception]
  early_checkin:
    event_aliases: [early_checkin_request]
  late_checkout:
    event_aliases: [late_checkout_request]
  damage_claim:
    event_aliases: [damage_report]
  vendor_dispatch:
    event_aliases: [vendor_dispatched, cleaner_dispatched]
  upsell_offer:
    event_aliases: [upsell, upsell_accepted, transfer_offer]
  discount_request:
    event_aliases: [discount_handling]
  pattern_promotion:
    event_aliases: [pattern_promote, pattern_demote]
  daily_briefing:
    event_aliases: []
  inquiry_reply:
    event_aliases: [inquiry]

# Incident event types the metrics collector counts as incidents
# (extends the kernel's generic incident/complaint/compensation set).
incident_event_types: [noise_complaint, damage]
