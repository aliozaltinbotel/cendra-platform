---
# ══════════════════════════════════════════════════════════════════════
# Migration 010 — event_sequencer table (out-of-order event guard).
# Numbered 010 (not 006) to avoid collision with reverted 006_pattern_class
# / 007 / 008 / 009 ConfigMaps + Jobs that still exist in the dev cluster
# from earlier work that was reverted in code but not in cluster state.
# ══════════════════════════════════════════════════════════════════════
# Persistent dedup + ordering ledger for the cascade-event consumer
# that reads Mümin's Service Bus topics (botel-property-sync,
# botel-reservation-sync, botel-conversation-sync, botel-guest-sync).
# Service Bus may redeliver after DLQ retry and may reorder messages
# under load; without a ledger Brain Engine would either duplicate
# memory writes or silently overwrite fresh state with stale.
#
# Composite PK is (topic, entity_id) so each subject keeps its own
# monotonic sequence.  ON CONFLICT DO UPDATE is gated on
# `EXCLUDED.last_sequence > event_sequencer.last_sequence`, returning
# the post-update row so the application can tell APPLY from
# DUPLICATE / OUT_OF_ORDER from the same single round-trip.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cendra-pg-migrations-010
  namespace: dev
  labels:
    app: cendra-pg
    component: migrations
data:
  010_event_sequencer.sql: |
    -- ---------------------------------------------------------
    -- EVENT_SEQUENCER — last applied (sequence, event_id) per
    -- (topic, entity_id).  Read+write hot-path is a single
    -- INSERT ... ON CONFLICT DO UPDATE WHERE; one row per subject.
    -- ---------------------------------------------------------
    CREATE TABLE IF NOT EXISTS event_sequencer (
        topic           TEXT        NOT NULL,
        entity_id       TEXT        NOT NULL,
        last_sequence   BIGINT      NOT NULL,
        last_event_id   TEXT        NOT NULL,
        last_applied_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        PRIMARY KEY (topic, entity_id)
    );

    -- "Which subjects have been quiet for a while?" — used by the
    -- DLQ-watch alert and by the cascade-consumer health probe.
    CREATE INDEX IF NOT EXISTS idx_event_sequencer_recency
        ON event_sequencer (last_applied_at DESC);

---
apiVersion: batch/v1
kind: Job
metadata:
  name: cendra-pg-migrate-010
  namespace: dev
  labels:
    app: cendra-pg
    component: migrations
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: cendra-pg
        component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Waiting for cendra-pg-rw to accept connections..."
              for i in $(seq 1 60); do
                if pg_isready -h cendra-pg-rw -U "$PGUSER"; then
                  break
                fi
                sleep 5
              done
              echo "Applying migration 010_event_sequencer.sql..."
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /migrations/010_event_sequencer.sql
              echo "Verifying event_sequencer table..."
              psql "$DATABASE_URL" -c "\d event_sequencer"
              echo "Migration 010 complete."
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: cendra-pg-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cendra-pg-app
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cendra-pg-app
                  key: uri
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: cendra-pg-migrations-010

---
# ══════════════════════════════════════════════════════════════════════
# Migration 011 — unanswered_threads table (sandbox example replies).
# ══════════════════════════════════════════════════════════════════════
# Persistent store for ``UnansweredThreadStore`` / ``PgUnansweredThreadStore``.
# Replaces the in-memory default wired in api_server/server.py so the
# sandbox preview survives api-server restarts and the V1 onboarding
# step 14 (past-conversation AI replay) keeps a durable record of every
# generated example reply.  One row per ``conversation_id`` — the
# upsert path is identical for the first capture and a re-generation
# after the PM rejects the candidate.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cendra-pg-migrations-011
  namespace: dev
  labels:
    app: cendra-pg
    component: migrations
data:
  011_unanswered_threads.sql: |
    -- ---------------------------------------------------------
    -- UNANSWERED_THREADS — one sandbox row per unanswered guest
    -- conversation; ON CONFLICT (conversation_id) DO UPDATE
    -- keeps the SQL path identical for first capture and the
    -- re-harvest after the PM has reviewed the candidate.
    -- ---------------------------------------------------------
    CREATE TABLE IF NOT EXISTS unanswered_threads (
        conversation_id      TEXT        NOT NULL PRIMARY KEY,
        property_id          TEXT        NOT NULL,
        last_guest_message   TEXT        NOT NULL,
        last_guest_sent_at   TIMESTAMPTZ NOT NULL,
        example_reply        TEXT        NOT NULL,
        generated_by         TEXT        NOT NULL,
        language             TEXT        NOT NULL DEFAULT '',
        generated_at         TIMESTAMPTZ NOT NULL DEFAULT now(),
        -- Comma-separated rule names from
        -- ``brain_engine.sandbox.review_heuristics.classify_review_need``.
        -- Empty string means the heuristic check found nothing
        -- suspicious; the column stays empty for template-generated
        -- rows and rows produced before the heuristic was wired.
        needs_review_reason  TEXT        NOT NULL DEFAULT ''
    );

    -- Listing path orders by ``last_guest_sent_at DESC`` per property
    -- so the UI surfaces the freshest unanswered thread first.
    CREATE INDEX IF NOT EXISTS idx_unanswered_threads_by_property
        ON unanswered_threads (property_id, last_guest_sent_at DESC);

