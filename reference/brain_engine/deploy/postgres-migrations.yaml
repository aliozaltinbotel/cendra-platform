# ══════════════════════════════════════════════════════════════════════
# Migration 012 — property_profiles
# ══════════════════════════════════════════════════════════════════════
# PG-backed persistence for ``PropertyProfile`` snapshots produced by
# the onboarding bootstrap.  Replaces ``InMemoryPropertyProfileStore``,
# whose contents disappear on every pod restart / autoscaler eviction
# and force a fresh 7-minute bootstrap before the chat can answer
# WiFi / parking / check-in questions.
#
# Schema is intentionally narrow: one row per ``propertyChannelId``,
# the entire ``PropertyProfile`` is serialised into a single JSONB
# ``payload`` column.  Hydration is performed in code by
# :class:`PgPropertyProfileStore`, so the SQL surface stays
# read/write-symmetrical (``ON CONFLICT DO UPDATE`` keeps the upsert
# path identical to the initial insert).
apiVersion: v1
kind: ConfigMap
metadata:
  name: cendra-pg-migrations-012
  namespace: dev
  labels:
    app: cendra-pg
    component: migrations
data:
  012_property_profiles.sql: |
    -- ---------------------------------------------------------
    -- PROPERTY_PROFILES — durable cache of the onboarding-built
    -- ``PropertyProfile`` snapshot, keyed by ``propertyChannelId``.
    -- One row per property; ``payload`` carries the full unified
    -- static payload (WiFi, parking, amenities, descriptions, …)
    -- plus the aggregate KnowledgeSection / ReviewAggregate blocks.
    -- ---------------------------------------------------------
    CREATE TABLE IF NOT EXISTS property_profiles (
        property_channel_id  TEXT         NOT NULL PRIMARY KEY,
        payload              JSONB        NOT NULL,
        built_at             TIMESTAMPTZ  NOT NULL,
        updated_at           TIMESTAMPTZ  NOT NULL DEFAULT now()
    );

    -- Listing path orders by ``built_at DESC`` so the UI surfaces the
    -- freshest profile first; mirrors ``InMemoryPropertyProfileStore.
    -- list_all`` ordering after a stable ascending sort upstream.
    CREATE INDEX IF NOT EXISTS idx_property_profiles_built_at
        ON property_profiles (built_at DESC);

