# ══════════════════════════════════════════════════════════════════════
# Migration 021 — bi-temporal soft-invalidate on pattern_rules.
# ══════════════════════════════════════════════════════════════════════
# Adds invalid_at + deactivated_at columns so the resolver in
# brain_engine/patterns/pattern_miner.py:_resolve_pattern_rule_contradictions
# can soft-invalidate older rules when a newer rule supersedes them
# without losing the historical row (Sprint 1 — Graphiti port,
# arXiv 2501.13956 §3.2).  Pure ADD COLUMN + indexes; rollback is
# a column drop.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cendra-pg-migrations-021
  namespace: dev
  labels:
    app: cendra-pg
    component: migrations
data:
  021_pattern_rule_bitemporal.sql: |
    BEGIN;

    ALTER TABLE pattern_rules
        ADD COLUMN IF NOT EXISTS invalid_at TIMESTAMPTZ,
        ADD COLUMN IF NOT EXISTS deactivated_at TIMESTAMPTZ;

    -- Backfill: deactivated rows get deactivated_at = updated_at so
    -- audit queries still locate the moment of deactivation.
    UPDATE pattern_rules
    SET deactivated_at = updated_at
    WHERE active = false
      AND deactivated_at IS NULL;

    CREATE INDEX IF NOT EXISTS idx_pattern_rules_invalid_at
        ON pattern_rules (invalid_at);

    CREATE INDEX IF NOT EXISTS idx_pattern_rules_deactivated_at
        ON pattern_rules (deactivated_at);

    COMMIT;

