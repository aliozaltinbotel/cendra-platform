---
# ══════════════════════════════════════════════════════════════════════
# Migration 005 — decision_cards table (proposed decision card store).
# ══════════════════════════════════════════════════════════════════════
# Persistent store for CardStore / PgCardStore.  Replaces the
# InMemoryCardStore wired in api_server/server.py lifespan so that
# confirmed / dismissed / expired cards survive api-server restarts.
# The JSONB ``payload`` column holds the full DecisionCard value
# object (context_tag / title / reasoning rows / prepared action /
# trust_footer / autonomy_state) so the schema does not need to track
# every card-body evolution.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cendra-pg-migrations-005
  namespace: dev
  labels:
    app: cendra-pg
    component: migrations
data:
  005_decision_cards.sql: |
    -- ---------------------------------------------------------
    -- DECISION_CARDS — proposed cards surfaced to the V2 UI.
    -- One row per StoredCard; status transitions are in-place
    -- updates so the card id remains stable across lifecycle.
    -- ---------------------------------------------------------
    CREATE TABLE IF NOT EXISTS decision_cards (
        card_id         TEXT        PRIMARY KEY,
        property_id     TEXT        NOT NULL,
        workflow        TEXT        NOT NULL,
        status          TEXT        NOT NULL DEFAULT 'pending',
        payload         JSONB       NOT NULL,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
        resolved_at     TIMESTAMPTZ,
        resolved_by     TEXT,
        resolution_note TEXT,
        CHECK (status IN ('pending','confirmed','dismissed','expired'))
    );

    -- Hot path: UI asks for cards per property, newest first.
    CREATE INDEX IF NOT EXISTS idx_decision_cards_property_created
        ON decision_cards (property_id, created_at DESC);

    -- Partial index for the active-queue read (the most frequent
    -- V2 UI call) so the planner avoids scanning resolved rows.
    CREATE INDEX IF NOT EXISTS idx_decision_cards_pending
        ON decision_cards (property_id, created_at DESC)
        WHERE status = 'pending';

