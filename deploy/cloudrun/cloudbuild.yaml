# CD build: fork api image + Cloud Run wrapper, tagged by commit SHA.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-f', 'api/Dockerfile',
           '-t', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dify-api-repo/dify-api:${_TAG}',
           '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dify-api-repo/dify-api:${_TAG}']
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-f', 'deploy/cloudrun/Dockerfile',
           '--build-arg', 'BASE_IMAGE=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dify-api-repo/dify-api:${_TAG}',
           '-t', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dify-api-repo/dify-api:${_TAG}-cr',
           'deploy/cloudrun']
images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dify-api-repo/dify-api:${_TAG}-cr'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: 3600s
