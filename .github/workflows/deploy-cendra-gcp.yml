# CENDRA C8: commit -> deploy pipeline for the GCP Cloud Run stack.
# Auth is keyless (Workload Identity Federation; org policy forbids SA
# keys). Builds the fork api image + Cloud Run wrapper tagged with the
# commit SHA, then rolls dify-service and dify-beat to it. Terraform
# stays the human-run infra tool; CD only moves app revisions.
name: Deploy Cendra (GCP Cloud Run)

on:
  push:
    branches:
      - cendra/main

concurrency:
  group: deploy-gcp
  # a newer commit supersedes the one being deployed
  cancel-in-progress: true

env:
  PROJECT_ID: brainenginev2
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/200411912113/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: cendra-deployer@brainenginev2.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build images (api + Cloud Run wrapper)
        run: |
          gcloud builds submit \
            --config=deploy/cloudrun/cloudbuild.yaml \
            --substitutions=_REGION=${REGION},_PROJECT_ID=${PROJECT_ID},_TAG=${GITHUB_SHA::12} \
            .

      - name: Roll dify-service + dify-beat revisions (parallel)
        run: |
          IMG=${REGION}-docker.pkg.dev/${PROJECT_ID}/dify-api-repo/dify-api:${GITHUB_SHA::12}-cr
          gcloud run services update dify-service --region ${REGION} \
            --container dify-api --image $IMG \
            --container dify-worker --image $IMG &
          gcloud run services update dify-beat --region ${REGION} \
            --container dify-beat --image $IMG &
          wait

      - name: Smoke check
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://v2beta.cendra.ai/console/api/setup --max-time 20 || true)
            [ "$code" = "200" ] && echo "console api healthy" && exit 0
            sleep 15
          done
          echo "smoke check failed (last code: $code)" && exit 1
